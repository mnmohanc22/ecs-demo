version: "3.9"

services:

  # ── Flask Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flask-backend
    # Non-sensitive DB properties loaded from .env file.
    # DB_PASSWORD is intentionally absent here — the app fetches it
    # from AWS Secrets Manager at startup using SECRET_NAME.
    # For local dev without Secrets Manager, set DB_PASSWORD here or
    # in backend/.env and leave SECRET_NAME unset.
    env_file:
      - ./backend/.env
    environment:
      # These override any matching keys in the .env file.
      - FLASK_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"       # Direct access for debugging
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend + Nginx ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    environment:
      - BACKEND_URL=http://backend:5000
    ports:
      - "80:80"           # HTTP → redirects to HTTPS
      - "443:443"         # HTTPS (self-signed cert)
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
